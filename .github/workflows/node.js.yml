name: Local Docker Deploy

on:
  push:
    branches: ["main"]

env:
  APP_DIR: lex-chat-ux
  IMAGE_NAME: lexapp
  IMAGE_TAG: "0.01"
  CONTAINER_NAME: lexapp
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/lexapp

jobs:
  publish-dockerhub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          file: ${{ env.APP_DIR }}/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_IMAGE }}:latest

  deploy-local-docker:
    runs-on: self-hosted
    needs: publish-dockerhub

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker --version

      - name: Stop existing container
        run: docker stop ${{ env.CONTAINER_NAME }} || true

      - name: Remove existing container
        run: docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Remove previous image
        run: docker rmi ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Run container
        run: |
          docker run -d --rm \
            --name ${{ env.CONTAINER_NAME }} \
            -p 3000:3000 \
            -p 9000:9000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Check running container
        run: docker ps
