name: Local Docker Deploy

on:
  push:
    branches: ["main"]

env:
  APP_DIR: lex-chat-ux
  IMAGE_NAME: lexapp
  IMAGE_TAG: "0.01"
  CONTAINER_NAME: lexapp

jobs:
  deploy-local-docker:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker --version

      - name: Stop existing container
        run: docker stop ${{ env.CONTAINER_NAME }} || true

      - name: Remove existing container
        run: docker rm ${{ env.CONTAINER_NAME }} || true

      - name: Remove previous image
        run: docker rmi ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} || true

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .

      - name: Run container
        run: |
          docker run -d --rm \
            --name ${{ env.CONTAINER_NAME }} \
            -p 3000:3000 \
            -p 9000:9000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Check running container
        run: docker ps
